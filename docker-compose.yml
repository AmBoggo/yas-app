version: '3.8'

services:
  yas-api:
    image: maven:3.9-eclipse-temurin-21-alpine
    container_name: yas-api
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - maven-repo:/root/.m2
    working_dir: /app
    command: ["./mvnw", "quarkus:dev", "-Dquarkus.http.host=0.0.0.0"]
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://yas-db:5432/yas
      - QUARKUS_DATASOURCE_USERNAME=yas
      - QUARKUS_DATASOURCE_PASSWORD=yas123
      - QUARKUS_HTTP_PORT=8080
    depends_on:
      yas-db:
        condition: service_healthy
    networks:
      - yas-network

  yas-db:
    image: postgres:16-alpine
    container_name: yas-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: yas
      POSTGRES_USER: yas
      POSTGRES_PASSWORD: yas123
    volumes:
      - yas-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yas -d yas"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yas-network

volumes:
  yas-pgdata:
  maven-repo:

networks:
  yas-network:
    driver: bridge