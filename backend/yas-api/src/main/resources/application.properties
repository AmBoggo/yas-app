# ── YAS API Configuration ──

# Server
quarkus.http.host=0.0.0.0
quarkus.http.port=8080

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://yas-db:5432/yas
quarkus.datasource.username=yas
quarkus.datasource.password=yas123

# Hibernate
quarkus.hibernate-orm.database.generation=update

# API docs
quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.path=/api/docs

# Logging
quarkus.log.level=INFO
quarkus.log.console.enable=true

# Dictionary API
quarkus.rest-client.dictionary-api.url=https://api.dictionaryapi.dev
quarkus.rest-client.dictionary-api.scope=jakarta.inject.Singleton
