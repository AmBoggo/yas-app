name: Build APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
  workflow_dispatch:  # Permite executar manualmente

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Instalar SDK platforms necessários
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          # Tenta instalar várias platforms (a que estiver disponível pega)
          for p in "platforms;android-37" "platforms;android-36" "platforms;android-35" "platforms;android-34"; do
            echo "Tentando instalar $p..."
            sdkmanager "$p" 2>&1 | tail -2 && break
          done
          for bt in "build-tools;37.0.0" "build-tools;36.0.0" "build-tools;35.0.0" "build-tools;34.0.0"; do
            echo "Tentando instalar $bt..."
            sdkmanager "$bt" 2>&1 | tail -2 && break
          done

      - name: 🔧 Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: 🔨 Gerar gradlew wrapper
        run: |
          cd android/YasApp
          gradle wrapper --gradle-version 9.5.0 2>&1 | tail -3

      - name: 🏗️ Build APK (debug)
        run: |
          cd android/YasApp
          ./gradlew assembleDebug 2>&1

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YAS-APK
          path: android/YasApp/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error